<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UniMaps · Teste AR (Passo 1)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, sans-serif; }

  /* HUD de instruções e diagnóstico */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 12px 16px calc(12px + env(safe-area-inset-top));
    padding-top: max(12px, env(safe-area-inset-top));
    background: linear-gradient(180deg, rgba(10,23,48,.92), rgba(10,23,48,.55), transparent);
    color: #fff; pointer-events: none;
  }
  #hud h1 { font-size: 15px; font-weight: 700; }
  #hud h1 b { color: #5b9cff; }
  #hud p { font-size: 12.5px; color: #cfe0ff; margin-top: 4px; line-height: 1.4; }
  #status {
    margin-top: 8px; display: inline-block; font-family: ui-monospace, monospace;
    font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 8px;
    background: rgba(31,111,232,.25); border: 1px solid rgba(91,156,255,.5); color: #eaf1ff;
  }
  #status.ok { background: rgba(31,184,122,.25); border-color: #1fb87a; }
  #status.err { background: rgba(224,69,123,.25); border-color: #e0457b; }

  /* painel inferior: instruções de uso */
  #foot {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(0deg, rgba(10,23,48,.92), transparent);
    color: #cfe0ff; font-size: 12.5px; text-align: center; line-height: 1.5; pointer-events: none;
  }
  #foot b { color: #fff; }
  #foot a { color: #5b9cff; pointer-events: auto; }

  /* botão iniciar (necessário p/ pedir permissão de câmera no toque) */
  #startBtn {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 20;
    background: #1f6fe8; color: #fff; border: 0; border-radius: 14px;
    padding: 16px 26px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer;
    box-shadow: 0 12px 34px rgba(31,111,232,.5);
  }
  #startBtn:active { transform: translate(-50%,-50%) scale(.97); }

  /* o AR.js injeta um <video> e um <canvas> em tela cheia */
  video, canvas.ar { position: fixed !important; top: 0 !important; left: 0 !important;
    width: 100% !important; height: 100% !important; object-fit: cover; }
</style>
</head>
<body>

<div id="hud">
  <h1><b>Uni</b>MAPS · Teste de AR <span style="opacity:.6">(Passo 1)</span></h1>
  <p>Aponte a câmera para o marcador <b>Hiro</b>. Deve aparecer um objeto 3D azul sobre ele.</p>
  <span id="status">Toque em “Iniciar” para ligar a câmera</span>
</div>

<button id="startBtn">▶ Iniciar câmera AR</button>

<div id="foot">
  <b>Não tem o marcador?</b> Abra a imagem Hiro em outra tela e aponte para ela:<br>
  <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">abrir marcador Hiro ↗</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" type="module" id="three-probe"></script>
<script type="module">
let statusEl = document.getElementById('status');
function setStatus(txt, kind) {
  statusEl.textContent = txt;
  statusEl.className = kind || '';
}

// AR.js (versão Three.js) — carrega a build standalone que inclui o THREEx.ArToolkit
// Usamos a distribuição que casa com Three.js.
const AR_JS = 'https://raw.githack.com/AR-js-org/AR.js/3.4.5/three.js/build/ar-threex.js';

let THREE, scene, camera, renderer, arToolkitSource, arToolkitContext, markerRoot, clock;

async function boot() {
  setStatus('Carregando bibliotecas…');
  try {
    THREE = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js');
    window.THREE = THREE; // AR.js (script clássico) procura window.THREE
  } catch (e) {
    setStatus('Falha ao carregar Three.js: ' + e.message, 'err'); return;
  }

  // AR.js clássico é um script global (não-módulo). Injeta e espera carregar.
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = AR_JS;
    s.onload = res;
    s.onerror = () => rej(new Error('não baixou o AR.js'));
    document.head.appendChild(s);
  }).catch(e => { setStatus('Falha ao carregar AR.js: ' + e.message, 'err'); throw e; });

  if (!window.THREEx || !window.THREEx.ArToolkitSource) {
    setStatus('AR.js carregou mas THREEx não apareceu.', 'err'); return;
  }

  initAR();
}

function initAR() {
  setStatus('Pedindo acesso à câmera…');

  scene = new THREE.Scene();
  camera = new THREE.Camera();
  scene.add(camera);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.domElement.classList.add('ar');
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const dir = new THREE.DirectionalLight(0xffffff, 0.6);
  dir.position.set(1, 2, 1); scene.add(dir);

  // fonte de vídeo (câmera traseira)
  arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });
  arToolkitSource.init(() => {
    setTimeout(onResize, 300);
    setStatus('Câmera ligada · procurando marcador…');
  }, () => {
    setStatus('Permissão de câmera negada ou indisponível.', 'err');
  });

  // contexto AR (parâmetros da câmera)
  arToolkitContext = new THREEx.ArToolkitContext({
    cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/3.4.5/data/data/camera_para.dat',
    detectionMode: 'mono',
  });
  arToolkitContext.init(() => {
    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
  });

  // marcador Hiro
  markerRoot = new THREE.Group();
  scene.add(markerRoot);
  new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
    type: 'pattern',
    patternUrl: 'https://raw.githack.com/AR-js-org/AR.js/3.4.5/data/data/patt.hiro',
  });

  // objeto 3D sobre o marcador: um "pino" UniMaps + cubo girando
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1, 1, 1),
    new THREE.MeshStandardMaterial({ color: 0x1f6fe8, roughness: 0.4, metalness: 0.1 })
  );
  cube.position.y = 0.5;
  markerRoot.add(cube);
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(0.5, 0.8, 4),
    new THREE.MeshStandardMaterial({ color: 0x5b9cff })
  );
  cone.position.y = 1.4; cone.rotation.y = Math.PI / 4;
  markerRoot.add(cone);
  markerRoot.userData = { cube, cone, seen: false };

  clock = new THREE.Clock();
  window.addEventListener('resize', onResize);
  animate();
}

function onResize() {
  if (!arToolkitSource || !arToolkitSource.ready) return;
  arToolkitSource.onResizeElement();
  arToolkitSource.copyElementSizeTo(renderer.domElement);
  if (arToolkitContext && arToolkitContext.arController) {
    arToolkitSource.copyElementSizeTo(arToolkitContext.arController.canvas);
  }
}

function animate() {
  requestAnimationFrame(animate);
  if (arToolkitSource && arToolkitSource.ready) {
    arToolkitContext.update(arToolkitSource.domElement);
  }
  if (markerRoot) {
    const t = clock.getElapsedTime();
    const u = markerRoot.userData;
    if (u.cube) u.cube.rotation.y = t;
    if (u.cone) u.cone.rotation.y = t * 1.5;
    // feedback: marcador visível?
    if (markerRoot.visible && !u.seen) { u.seen = true; setStatus('Marcador detectado! ✓', 'ok'); }
    else if (!markerRoot.visible && u.seen) { u.seen = false; setStatus('Câmera ligada · procurando marcador…'); }
  }
  renderer.render(scene, camera);
}

document.getElementById('startBtn').addEventListener('click', async () => {
  document.getElementById('startBtn').style.display = 'none';
  try { await boot(); }
  catch (e) { setStatus('Erro: ' + e.message, 'err'); }
});
</script>
</body>
</html>
